<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twibbon Maker Pro (1080x1920)</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 15px; 
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
        }
        h1 { margin-bottom: 5px; font-size: 24px; }
        p { color: #666; margin-top: 0; font-size: 14px; }
        
        #canvas-container { 
            position: relative; 
            display: inline-block; 
            margin-top: 10px; 
            max-width: 90%; 
            max-height: 60vh; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            cursor: move;
            touch-action: none;
        }
        
        canvas { 
            display: block;
            max-width: 100%; 
            max-height: 60vh;
            object-fit: contain;
            height: auto; 
        }
        
        .controls { 
            margin-top: 15px; 
            margin-bottom: 30px;
            padding: 0 10px;
        }
        
        .slider-container {
            margin: 15px auto;
            max-width: 300px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .slider-container label {
            font-size: 14px;
            font-weight: bold;
            color: #555;
        }

        input[type="range"] {
            flex-index: 1;
            width: 100%;
            accent-color: #007bff;
        }

        .btn-group {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 15px;
            margin: 5px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-action {
            background-color: #6c757d;
            color: white;
        }
        .btn-action:hover { background-color: #5a6268; }

        .btn-download {
            background-color: #28a745;
            color: white;
            padding: 12px 35px;
            font-size: 16px;
            box-shadow: 0 3px 10px rgba(40, 167, 69, 0.3);
        }
        .btn-download:hover { background-color: #218838; transform: translateY(-1px); }
        .btn-download:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }
        
        input[type="file"] {
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Twibbon Maker 📸</h1>
    <p>Geser foto langsung di frame. Gunakan slider untuk zoom dan tombol putar jika miring.</p>

    <input type="file" id="upload-input" accept="image/*">
    
    <div id="canvas-container">
        <canvas id="twibbonCanvas" width="1080" height="1920"></canvas>
    </div>

    <div class="controls">
        <div class="slider-container">
            <label>Zoom:</label>
            <input type="range" id="zoom-slider" min="10" max="400" value="100" disabled>
        </div>

        <div class="btn-group">
            <button id="rotate-btn" class="btn-action" disabled>🔄 Putar 90°</button>
            <button id="reset-btn" class="btn-action" disabled>Reset</button>
        </div>
        
        <button id="download-btn" class="btn-download" disabled>Download Hasil</button>
    </div>

    <script>
        const canvas = document.getElementById('twibbonCanvas');
        const ctx = canvas.getContext('2d');
        const uploadInput = document.getElementById('upload-input');
        const downloadBtn = document.getElementById('download-btn');
        const zoomSlider = document.getElementById('zoom-slider');
        const rotateBtn = document.getElementById('rotate-btn');
        const resetBtn = document.getElementById('reset-btn');
        const container = document.getElementById('canvas-container');

        // Load Frame
        const frameImg = new Image();
        frameImg.src = 'frame.png'; 

        let userImg = null;
        
        // State transformasi gambar
        let imgX = 0;
        let imgY = 0;
        let baseScale = 1; 
        let userZoomPerc = 100; // Persentase zoom dari slider (10% - 400%)
        let rotationAngle = 0;  // Derajat rotasi (0, 90, 180, 270)

        // State Drag
        let isDragging = false;
        let startX, startY;

        frameImg.onload = () => {
            renderSemua();
        };

        // Baca file upload
        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                userImg = new Image();
                userImg.onload = () => {
                    resetKondisiFoto();
                    
                    // Aktifkan kontrol
                    downloadBtn.disabled = false;
                    zoomSlider.disabled = false;
                    rotateBtn.disabled = false;
                    resetBtn.disabled = false;
                    
                    renderSemua();
                };
                userImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function resetKondisiFoto() {
            if(!userImg) return;
            rotationAngle = 0;
            userZoomPerc = 100;
            zoomSlider.value = 100;
            
            // Hitung base scale awal biar fit-cover
            baseScale = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
            
            // Tengahkan posisi koordinat
            imgX = canvas.width / 2;
            imgY = canvas.height / 2;
        }

        // Fungsi Render Utama
        function renderSemua() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (userImg) {
                ctx.save();
                
                // Pindahkan anchor ke titik koordinat gambar (untuk mempermudah translasi & rotasi)
                ctx.translate(imgX, imgY);
                
                // Jalankan rotasi berdasarkan derajat (diubah ke Radian)
                ctx.rotate((rotationAngle * Math.PI) / 180);
                
                // Hitung skala final gabungan baseScale dan persentase slider
                const finalScale = baseScale * (userZoomPerc / 100);
                
                // Gambar dengan poros tengah di (0,0) canvas hasil translate
                ctx.drawImage(
                    userImg, 
                    -(userImg.width * finalScale) / 2, 
                    -(userImg.height * finalScale) / 2, 
                    userImg.width * finalScale, 
                    userImg.height * finalScale
                );
                
                ctx.restore();
            }

            // Tempel frame di lapisan paling atas
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        // Event Slider Zoom
        zoomSlider.addEventListener('input', (e) => {
            userZoomPerc = parseInt(e.target.value);
            renderSemua();
        });

        // Event Tombol Rotasi (Tambah 90 derajat tiap klik)
        rotateBtn.addEventListener('click', () => {
            rotationAngle = (rotationAngle + 90) % 360;
            renderSemua();
        });

        // Event Tombol Reset
        resetBtn.addEventListener('click', () => {
            resetKondisiFoto();
            renderSemua();
        });

        // Logika Geser/Drag (Mouse & Touchscreen)
        function mulaiGeser(e) {
            if (!userImg) return;
            isDragging = true;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const rect = canvas.getBoundingClientRect();
            const visualScaleX = canvas.width / rect.width;
            const visualScaleY = canvas.height / rect.height;

            startX = clientX * visualScaleX - imgX;
            startY = clientY * visualScaleY - imgY;
        }

        function prosesGeser(e) {
            if (!isDragging) return;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const rect = canvas.getBoundingClientRect();
            const visualScaleX = canvas.width / rect.width;
            const visualScaleY = canvas.height / rect.height;

            imgX = clientX * visualScaleX - startX;
            imgY = clientY * visualScaleY - startY;

            renderSemua();
        }

        function selesaiGeser() {
            isDragging = false;
        }

        container.addEventListener('mousedown', mulaiGeser);
        window.addEventListener('mousemove', prosesGeser);
        window.addEventListener('mouseup', selesaiGeser);

        container.addEventListener('touchstart', mulaiGeser);
        window.addEventListener('touchmove', prosesGeser);
        window.addEventListener('touchend', selesaiGeser);

        // Download Final
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'twibbon-perfect-portrait.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>

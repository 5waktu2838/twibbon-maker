<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twibbon Generator Pro</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --success-hover: #059669;
            --secondary: #6B7280;
            --bg-main: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #4B5563;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container utama diset seukuran layar HP */
        .mobile-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--bg-card);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 { 
            font-size: 22px; 
            font-weight: 800;
            margin: 0 0 4px 0;
            background: linear-gradient(to right, var(--primary), #818CF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p { 
            color: var(--text-muted); 
            margin: 0; 
            font-size: 13px; 
        }
        
        /* Area Canvas Box */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        #canvas-container { 
            position: relative; 
            width: 100%;
            aspect-ratio: 9 / 16; /* Menjaga rasio 1080x1920 tetap proporsional */
            max-height: 55vh;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            background: #E5E7EB;
            border-radius: 16px;
            overflow: hidden;
            cursor: move;
            touch-action: none;
        }
        
        canvas { 
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Area Kontrol Panel */
        .control-panel { 
            background: #F9FAFB;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #E5E7EB;
        }

        /* Desain Custom Tombol Upload */
        .upload-box {
            margin-bottom: 15px;
        }

        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }
        .file-label:hover { background-color: var(--primary-hover); }
        
        input[type="file"] { display: none; }

        /* Slider Zoom Custom */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 4px 0;
        }

        .slider-group span {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 45px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #E5E7EB;
            border-radius: 8px;
            accent-color: var(--primary);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        /* Grup Tombol Aksi */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px;
            font-size: 14px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            background-color: white;
            color: var(--text-main);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-download {
            grid-column: span 2;
            background-color: var(--success);
            color: white;
            border: none;
            font-size: 16px;
            padding: 14px;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);
        }
        .btn-download:hover { background-color: var(--success-hover); }
        .btn-download:disabled { background-color: #D1D5DB; box-shadow: none; color: #9CA3AF; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <header>
            <h1>Twibbon Creator</h1>
            <p>Geser, perbesar, atau putar fotomu agar pas</p>
        </header>
        
        <div class="canvas-wrapper">
            <div id="canvas-container">
                <canvas id="twibbonCanvas" width="1080" height="1920"></canvas>
            </div>
        </div>

        <div class="control-panel">
            <div class="upload-box">
                <label for="upload-input" class="file-label">
                    📷 Pilih Foto Kamu
                </label>
                <input type="file" id="upload-input" accept="image/*">
            </div>

            <div class="slider-group">
                <span>Zoom</span>
                <input type="range" id="zoom-slider" min="10" max="400" value="100" disabled>
            </div>

            <div class="btn-grid">
                <button id="rotate-btn" disabled>🔄 Putar 90°</button>
                <button id="reset-btn" disabled>⏱️ Reset</button>
                <button id="download-btn" class="btn-download" disabled>Simpan Twibbon</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('twibbonCanvas');
        const ctx = canvas.getContext('2d');
        const uploadInput = document.getElementById('upload-input');
        const downloadBtn = document.getElementById('download-btn');
        const zoomSlider = document.getElementById('zoom-slider');
        const rotateBtn = document.getElementById('rotate-btn');
        const resetBtn = document.getElementById('reset-btn');
        const container = document.getElementById('canvas-container');

        const frameImg = new Image();
        frameImg.src = 'frame.png'; 

        let userImg = null;
        let imgX = 0, imgY = 0, baseScale = 1; 
        let userZoomPerc = 100, rotationAngle = 0;
        let isDragging = false, startX, startY;

        frameImg.onload = () => { renderSemua(); };

        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                userImg = new Image();
                userImg.onload = () => {
                    resetKondisiFoto();
                    downloadBtn.disabled = false;
                    zoomSlider.disabled = false;
                    rotateBtn.disabled = false;
                    resetBtn.disabled = false;
                    renderSemua();
                };
                userImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function resetKondisiFoto() {
            if(!userImg) return;
            rotationAngle = 0;
            userZoomPerc = 100;
            zoomSlider.value = 100;
            baseScale = Math.max(canvas.width / userImg.width, canvas.height / userImg.height);
            imgX = canvas.width / 2;
            imgY = canvas.height / 2;
        }

        function renderSemua() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (userImg) {
                ctx.save();
                ctx.translate(imgX, imgY);
                ctx.rotate((rotationAngle * Math.PI) / 180);
                const finalScale = baseScale * (userZoomPerc / 100);
                ctx.drawImage(userImg, -(userImg.width * finalScale) / 2, -(userImg.height * finalScale) / 2, userImg.width * finalScale, userImg.height * finalScale);
                ctx.restore();
            }
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        zoomSlider.addEventListener('input', (e) => {
            userZoomPerc = parseInt(e.target.value);
            renderSemua();
        });

        rotateBtn.addEventListener('click', () => {
            rotationAngle = (rotationAngle + 90) % 360;
            renderSemua();
        });

        resetBtn.addEventListener('click', () => {
            resetKondisiFoto();
            renderSemua();
        });

        function mulaiGeser(e) {
            if (!userImg) return;
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = canvas.getBoundingClientRect();
            startX = clientX * (canvas.width / rect.width) - imgX;
            startY = clientY * (canvas.height / rect.height) - imgY;
        }

        function prosesGeser(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = canvas.getBoundingClientRect();
            imgX = clientX * (canvas.width / rect.width) - startX;
            imgY = clientY * (canvas.height / rect.height) - startY;
            renderSemua();
        }

        function selesaiGeser() { isDragging = false; }

        container.addEventListener('mousedown', mulaiGeser);
        window.addEventListener('mousemove', prosesGeser);
        window.addEventListener('mouseup', selesaiGeser);
        container.addEventListener('touchstart', mulaiGeser);
        window.addEventListener('touchmove', prosesGeser);
        window.addEventListener('touchend', selesaiGeser);

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'twibbon-mobile-pro.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
